name: travelfile
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.7.2

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  firebase_core: ^4.1.0
  firebase_auth: ^6.0.2
  cloud_firestore: ^6.0.1
  firebase_storage: ^13.0.1
  file_picker: ^10.2.0
  open_file: ^3.5.10
  path: ^1.9.1
  path_provider: ^2.1.5
  dio: ^5.8.0+1
  permission_handler: ^12.0.1
  syncfusion_flutter_pdfviewer: ^32.2.8
  http: ^1.4.0
  flutter_pdfview: ^1.4.1+1
  firebase_app_check: ^0.4.1+5
  local_auth: ^3.0.0
  google_sign_in: ^7.2.0
  get: ^4.7.2
  flutterfire_cli: ^1.3.1
  flutter_network: ^1.3.2+7
  app_settings: ^7.0.0
  network_info_plus: ^7.0.0
  provider: ^6.1.5+1
  google_fonts: ^6.2.1
  sign_in_with_apple: ^6.1.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3

flutter:
  uses-material-design: true
  assets:
     - assets/images/logo.png
     - assets/images/aviao-de-papel.png
     - assets/images/cama-de-hotel.png
     - assets/images/ingressos-de-cinema.png
     - assets/images/onibus.png
     - assets/images/rota.png
     - assets/images/user.png
     - assets/images/voo-de-aviao.png
     - assets/images/google_pb.png
     - assets/images/google_color.png

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/logo.png"
  min_sdk_android: 21
